name: hw1
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  http: ^1.6.0
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/

  fonts:
    - family: NotoSansCJKkr
      fonts:
        - asset: assets/fonts/NotoSansCJKkr/NotoSansCJKkr-Thin.otf
          weight: 100
        - asset: assets/fonts/NotoSansCJKkr/NotoSansCJKkr-Light.otf
          weight: 200
        - asset: assets/fonts/NotoSansCJKkr/NotoSansCJKkr-DemiLight.otf
          weight: 300
        - asset: assets/fonts/NotoSansCJKkr/NotoSansCJKkr-Regular.otf
          weight: 400
        - asset: assets/fonts/NotoSansCJKkr/NotoSansCJKkr-Medium.otf
          weight: 500
        - asset: assets/fonts/NotoSansCJKkr/NotoSansCJKkr-Bold.otf
          weight: 700
        - asset: assets/fonts/NotoSansCJKkr/NotoSansCJKkr-Black.otf
          weight: 900

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto/Roboto-Thin.ttf
          weight: 100
        - asset: assets/fonts/Roboto/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/Roboto/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto/Roboto-Black.ttf
          weight: 900
